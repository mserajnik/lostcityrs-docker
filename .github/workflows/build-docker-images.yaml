name: Build and push Docker images

on:
  # Build images daily.
  schedule:
    - cron: 0 0 * * *
  push:
    branches:
      - master
    paths:
      - .dockerignore
      - .github/scripts/**
      - .github/workflows/build-and-push-image.yaml
      - .github/workflows/build-docker-images.yaml
      - Dockerfile
      - Dockerfile.node
      - docker-cmd-start.sh
      - docker-cmd-start-node.sh
  pull_request:
    branches:
      - master
    paths:
      - .dockerignore
      - .github/scripts/**
      - .github/workflows/build-and-push-image.yaml
      - .github/workflows/build-docker-images.yaml
      - Dockerfile
      - Dockerfile.node
      - docker-cmd-start.sh
      - docker-cmd-start-node.sh
  workflow_dispatch:
    inputs:
      force_rebuild:
        type: boolean
        description: Force rebuild (even if images for the latest commits already exist)
        default: false

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
    outputs:
      build_metadata: ${{ steps.prepare-default-build.outputs.build_metadata }}
      versions: ${{ steps.prepare-default-build.outputs.versions }}
      versions_to_build: ${{ steps.prepare-default-build.outputs.versions_to_build }}
      any_images_to_build: ${{ steps.prepare-default-build.outputs.any_images_to_build }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      # We resolve the latest engine and content commit hashes for each
      # supported version and check whether matching images already exist.
      # Per-version build metadata gets emitted as a single JSON blob that the
      # matrix jobs below can index into.
      #
      # We check if the workflow was triggered by a schedule and if today is
      # Monday, in which case we want to trigger a (re)build in any case (to
      # keep the Docker images up to date).
      #
      # We also check if the "force rebuild" input is checked when the workflow
      # is triggered manually; if yes, we also want to (re)build.
      - name: Prepare default build
        id: prepare-default-build
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          PACKAGE_OWNER: ${{ github.repository_owner }}
          PACKAGE_NAME: lostcityrs
          ENGINE_REPOSITORY_OWNER: LostCityRS
          ENGINE_REPOSITORY_NAME: Engine-TS
          CONTENT_REPOSITORY_OWNER: LostCityRS
          CONTENT_REPOSITORY_NAME: Content
          VERSIONS: '["274", "254", "245.2", "244", "225"]'
          FORCE_REBUILD: ${{ inputs.force_rebuild }}
        run: ./.github/scripts/prepare-default-build.sh

      # Compares the upstream engine files our setup couples to (the
      # configuration loader, `.gitignore`, the SQLite migration set) against
      # the commit each version was last reviewed against, and additionally
      # trips when a Bun version gains a `package-lock.json` (the artifact of
      # the upstream switch to Node). Fails the workflow on any drift so the
      # change can be reviewed before images are (re)built; after refreshing
      # any affected local files, bump the matching version's commit hash in
      # `DRIFT_KNOWN_COMMITS` below.
      - name: Check for upstream drift
        env:
          GH_TOKEN: ${{ github.token }}
          ENGINE_REPOSITORY: LostCityRS/Engine-TS
          BUILD_METADATA: ${{ steps.prepare-default-build.outputs.build_metadata }}
          DRIFT_KNOWN_COMMITS: |
            {
              "225": "e1dea19f256c7ff1a89d47024c811c755ad2184d",
              "244": "9aadcec4e9560b810b5e5eee31aadc67f3b206cd",
              "245.2": "3c16994ca4ba51b4e04f88316c1f7395b0c4bb8a",
              "254": "2e3bcf4392200e84dd15ce67008c5d41fa4537aa",
              "274": "5b9e2ab0d03c95466622aa1263ee328257e0e936"
            }
        run: ./.github/scripts/check-upstream-drift.sh

  build-and-push-images:
    name: Build and push images
    needs: setup
    if: ${{ needs.setup.outputs.any_images_to_build == 'true' }}
    strategy:
      fail-fast: true
      matrix:
        version: ${{ fromJSON(needs.setup.outputs.versions_to_build) }}
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-and-push-image.yaml
    with:
      version: ${{ matrix.version }}
      push_images: ${{ github.event_name != 'pull_request' }}
      engine_commit_hash: ${{ fromJSON(needs.setup.outputs.build_metadata)[matrix.version].engine_commit_hash }}
      content_commit_hash: ${{ fromJSON(needs.setup.outputs.build_metadata)[matrix.version].content_commit_hash }}
      combined_revision_tag: ${{ fromJSON(needs.setup.outputs.build_metadata)[matrix.version].combined_revision_tag }}

  # Keep only a short retention window. Long-term availability of older images
  # is explicitly not promised: breaking changes accumulate over time, and
  # users running stale images risk hitting issues that have already been fixed
  # upstream. Anyone who needs an image for a specific commit should build it
  # locally.
  delete-old-package-versions:
    name: Delete old package versions
    needs: [setup, build-and-push-images]
    if: ${{ needs.setup.outputs.any_images_to_build == 'true' && github.event_name != 'pull_request' }}
    runs-on: ubuntu-24.04
    permissions:
      packages: write

    steps:
      - name: Delete old package versions
        uses: snok/container-retention-policy@v3.1.0
        with:
          account: user
          token: ${{ github.token }}
          image-names: lostcityrs
          cut-off: 2w
