name: Build and push Docker images

on:
  # Build images daily.
  schedule:
    - cron: 0 0 * * *
  push:
    branches:
      - master
    paths:
      - .dockerignore
      - .github/scripts/**
      - .github/workflows/build-docker-images.yaml
      - Dockerfile
      - docker-cmd-start.sh
  pull_request:
    branches:
      - master
    paths:
      - .dockerignore
      - .github/scripts/**
      - .github/workflows/build-docker-images.yaml
      - Dockerfile
      - docker-cmd-start.sh
  workflow_dispatch:
    inputs:
      force-rebuild:
        type: boolean
        description: Force rebuild (even if images for the latest commits already exist)
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/lostcityrs
  OCI_ANNOTATION_AUTHORS: ${{ vars.OCI_ANNOTATION_AUTHORS || github.repository_owner }}
  OCI_ANNOTATION_URL: https://github.com/${{ github.repository }}
  OCI_ANNOTATION_DOCUMENTATION: https://github.com/${{ github.repository }}/blob/master/README.md
  OCI_ANNOTATION_SOURCE: https://github.com/${{ github.repository }}
  OCI_ANNOTATION_VENDOR: ${{ vars.OCI_ANNOTATION_VENDOR || github.repository_owner }}
  OCI_ANNOTATION_LICENSES: MIT
  OCI_ANNOTATION_TITLE: Lost City RS
  OCI_ANNOTATION_DESCRIPTION: Lost City RS is a server emulator for RS2.
  OCI_ANNOTATION_BASE_NAME: bun:debian

jobs:
  build-and-push-images:
    name: Build and push images
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: true
      matrix:
        version: [254, 245.2, 244, 225]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # We check if the workflow was triggered by a schedule and if today is
      # Monday, in which case we want to trigger a (re)build in any case (to
      # keep the Docker images up-to-date).
      #
      # We also check if the "force rebuild" input is checked when the workflow
      # is triggered manually; if yes, we also want to (re)build.
      - name: Prepare default build
        id: prepare-default-build
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          PACKAGE_OWNER: ${{ github.repository_owner }}
          PACKAGE_NAME: lostcityrs
          ENGINE_REPOSITORY_OWNER: LostCityRS
          ENGINE_REPOSITORY_NAME: Engine-TS
          ENGINE_REPOSITORY_REF: ${{ matrix.version }}
          CONTENT_REPOSITORY_OWNER: LostCityRS
          CONTENT_REPOSITORY_NAME: Content
          CONTENT_REPOSITORY_REF: ${{ matrix.version }}
          VERSION: ${{ matrix.version }}
          FORCE_REBUILD: ${{ inputs.force-rebuild }}
        run: ./.github/scripts/prepare-default-build.sh

      - name: Prepare build metadata
        if: ${{ steps.prepare-default-build.outputs.images_already_exist != 'true' }}
        id: prepare-build-metadata
        env:
          ARCHITECTURES: both
          VERSION: ${{ matrix.version }}
          ENGINE_COMMIT_HASH: ${{ steps.prepare-default-build.outputs.engine_commit_hash }}
          COMBINED_COMMIT_HASHES_TAG: ${{ steps.prepare-default-build.outputs.combined_commit_hashes_tag }}
        run: ./.github/scripts/prepare-image-build.sh

      - name: Set up QEMU
        if: ${{ steps.prepare-build-metadata.outputs.needs_qemu == 'true' }}
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        if: ${{ steps.prepare-default-build.outputs.images_already_exist != 'true' }}
        uses: docker/setup-buildx-action@v4

      - name: Log in to container registry
        if: ${{ steps.prepare-default-build.outputs.images_already_exist != 'true' }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push images
        if: ${{ steps.prepare-default-build.outputs.images_already_exist != 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ steps.prepare-build-metadata.outputs.platforms }}
          push: ${{ github.event_name != 'pull_request' }}
          provenance: false
          build-args: |
            LOST_CITY_RS_VERSION=${{ matrix.version }}
          tags: ${{ steps.prepare-build-metadata.outputs.tags }}
          annotations: ${{ steps.prepare-build-metadata.outputs.annotations }}
          labels: ${{ steps.prepare-build-metadata.outputs.labels }}

  delete-old-package-versions:
    name: Delete old package versions
    needs: [build-and-push-images]
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Delete old package versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: lostcityrs
          package-type: container
          # According to
          # https://docs.github.com/en/enterprise-server@3.11/packages/working-with-a-github-packages-registry/working-with-the-npm-registry#limits-for-published-npm-versions
          # there might at some point be a limit of 1,000 versions per package.
          # It is not clear if that will only be applied to Enterprise and/or
          # npm packages, but let's be safe and make sure we don't keep more
          # than 1,000.
          #
          # We have 4 different versions per build. For each version, we have
          # the image index plus two image manifests, making a total of 12
          # packages.
          #
          # This means, to stay below the assumed limit of 1,000 packages, we
          # can keep a maximum of 83 builds worth of server images; let's make
          # that 80 to have a nice and round number:
          # 12 * 80 = 960 packages
          min-versions-to-keep: 960
