name: Build and push Docker images

on:
  # Build images daily.
  schedule:
    - cron: 0 0 * * *
  push:
    branches:
      - master
    paths:
      - .dockerignore
      - .github/scripts/**
      - .github/workflows/build-and-push-image.yaml
      - .github/workflows/build-docker-images.yaml
      - Dockerfile
      - docker-cmd-start.sh
  pull_request:
    branches:
      - master
    paths:
      - .dockerignore
      - .github/scripts/**
      - .github/workflows/build-and-push-image.yaml
      - .github/workflows/build-docker-images.yaml
      - Dockerfile
      - docker-cmd-start.sh
  workflow_dispatch:
    inputs:
      force_rebuild:
        type: boolean
        description: Force rebuild (even if images for the latest commits already exist)
        default: false

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
    outputs:
      build_metadata: ${{ steps.prepare-default-build.outputs.build_metadata }}
      versions_to_build: ${{ steps.prepare-default-build.outputs.versions_to_build }}
      any_images_to_build: ${{ steps.prepare-default-build.outputs.any_images_to_build }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # We resolve the latest engine and content commit hashes for each
      # supported version and check whether matching images already exist.
      # Per-version build metadata gets emitted as a single JSON blob that the
      # matrix jobs below can index into.
      #
      # We force a rebuild on a Monday schedule run (to keep the Docker images
      # up to date even when no upstream commits land) and on manual runs with
      # the "force rebuild" input checked.
      - name: Prepare default build
        id: prepare-default-build
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          PACKAGE_OWNER: ${{ github.repository_owner }}
          PACKAGE_NAME: lostcityrs
          ENGINE_REPOSITORY_OWNER: LostCityRS
          ENGINE_REPOSITORY_NAME: Engine-TS
          CONTENT_REPOSITORY_OWNER: LostCityRS
          CONTENT_REPOSITORY_NAME: Content
          VERSIONS: '["254", "245.2", "244", "225"]'
          FORCE_REBUILD: ${{ inputs.force_rebuild }}
        run: ./.github/scripts/prepare-default-build.sh

  build-and-push-images:
    name: Build and push images
    needs: setup
    if: ${{ needs.setup.outputs.any_images_to_build == 'true' }}
    strategy:
      fail-fast: true
      matrix:
        version: ${{ fromJSON(needs.setup.outputs.versions_to_build) }}
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-and-push-image.yaml
    with:
      version: ${{ matrix.version }}
      push_images: ${{ github.event_name != 'pull_request' }}
      engine_commit_hash: ${{ fromJSON(needs.setup.outputs.build_metadata)[matrix.version].engine_commit_hash }}
      content_commit_hash: ${{ fromJSON(needs.setup.outputs.build_metadata)[matrix.version].content_commit_hash }}
      combined_commit_hashes_tag: ${{ fromJSON(needs.setup.outputs.build_metadata)[matrix.version].combined_commit_hashes_tag }}

  # Keep only a short retention window. Long-term availability of older images
  # is explicitly not promised: breaking changes accumulate over time, and
  # users running stale images risk hitting issues that have already been fixed
  # upstream. Anyone who needs an image for a specific commit should build it
  # locally.
  delete-old-package-versions:
    name: Delete old package versions
    needs: [setup, build-and-push-images]
    if: ${{ needs.setup.outputs.any_images_to_build == 'true' && github.event_name != 'pull_request' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Delete old package versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: lostcityrs
          package-type: container
          # 7 builds * (1 index + 2 manifests) * 4 versions = 84.
          min-versions-to-keep: 84
