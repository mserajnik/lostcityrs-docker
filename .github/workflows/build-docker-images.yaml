name: Build and push Docker images

on:
  # Build images daily.
  schedule:
    - cron: 0 0 * * *
  push:
    branches:
      - master
    paths:
      - .dockerignore
      - .github/scripts/**
      - .github/workflows/build-and-push-image.yaml
      - .github/workflows/build-docker-images.yaml
      - Dockerfile
      - docker-cmd-start.sh
  pull_request:
    branches:
      - master
    paths:
      - .dockerignore
      - .github/scripts/**
      - .github/workflows/build-and-push-image.yaml
      - .github/workflows/build-docker-images.yaml
      - Dockerfile
      - docker-cmd-start.sh
  workflow_dispatch:
    inputs:
      force_rebuild:
        type: boolean
        description: Force rebuild (even if images for the latest commits already exist)
        default: false

jobs:
  build-and-push-images:
    name: Build and push images
    strategy:
      fail-fast: true
      matrix:
        version: [254, 245.2, 244, 225]
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-and-push-image.yaml
    with:
      version: ${{ matrix.version }}
      push_images: ${{ github.event_name != 'pull_request' }}
      force_rebuild: ${{ github.event_name == 'workflow_dispatch' && inputs.force_rebuild || false }}
      trigger_event_name: ${{ github.event_name }}

  delete-old-package-versions:
    name: Delete old package versions
    needs: [build-and-push-images]
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Delete old package versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: lostcityrs
          package-type: container
          # According to
          # https://docs.github.com/en/enterprise-server@3.11/packages/working-with-a-github-packages-registry/working-with-the-npm-registry#limits-for-published-npm-versions
          # there might at some point be a limit of 1,000 versions per package.
          # It is not clear if that will only be applied to Enterprise and/or
          # npm packages, but let's be safe and make sure we don't keep more
          # than 1,000.
          #
          # We have 4 different versions per build. For each version, we have
          # the image index plus two image manifests, making a total of 12
          # packages.
          #
          # This means, to stay below the assumed limit of 1,000 packages, we
          # can keep a maximum of 83 builds worth of server images; let's make
          # that 80 to have a nice and round number:
          # 12 * 80 = 960 packages
          min-versions-to-keep: 960
